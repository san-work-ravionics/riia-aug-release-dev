name: Build & Deploy RITA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/san-work-ravionics/riia-aug-release-prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -c constraints-prod.txt -e ".[dev]"

      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check src/

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          mkdir -p test-results/unit
          pytest tests/unit/ --junitxml=test-results/unit/latest.xml -q

      - name: Run integration tests
        run: |
          source .venv/bin/activate
          mkdir -p test-results/integration
          pytest tests/integration/ --junitxml=test-results/integration/latest.xml -q

      - name: Run e2e tests (advisory)
        continue-on-error: true
        run: |
          source .venv/bin/activate
          mkdir -p test-results/e2e/rita test-results/e2e/fno test-results/e2e/ops
          pytest tests/e2e/ --junitxml=test-results/e2e/rita/latest.xml -q || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u san-work-ravionics --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .

      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.AWS_EC2_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync instrument data to EC2
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          rsync -az --delete -e "ssh $SSH_OPTS" data/raw/ ubuntu@${{ secrets.AWS_EC2_IP }}:/opt/rita_input/raw/
          rsync -az --delete -e "ssh $SSH_OPTS" data/input/ ubuntu@${{ secrets.AWS_EC2_IP }}:/opt/rita_input/input/
          rsync -az --delete -e "ssh $SSH_OPTS" data/agent-ops/ ubuntu@${{ secrets.AWS_EC2_IP }}:/opt/rita_input/agent-ops/
        continue-on-error: true

      - name: Free EC2 disk and remove old container
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_EC2_IP }} bash -s << ENDSSH
          docker stop rita 2>/dev/null || true
          docker rm rita 2>/dev/null || true
          docker image prune -af
          df -h /
          ENDSSH

      - name: Pull new image on EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_EC2_IP }} bash -s << ENDSSH
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u san-work-ravionics --password-stdin
          docker pull ${{ env.IMAGE }}:latest
          ENDSSH

      - name: Start new container
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_EC2_IP }} bash -s << ENDSSH
          docker run -d --name rita --restart unless-stopped \
            -p 127.0.0.1:8000:8000 \
            -e RITA_ENV=production \
            -e RITA_JWT_SECRET='${{ secrets.RITA_JWT_SECRET }}' \
            -e RITA_GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}' \
            -e RITA_GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}' \
            -e RITA_BASE_URL='${{ secrets.RITA_BASE_URL }}' \
            -e RITA_GITHUB_PAT='${{ secrets.RITA_GITHUB_PAT }}' \
            -v /opt/rita_input:/app/data:ro \
            -v /opt/rita_output:/app/rita_output \
            --memory 900m \
            --log-driver awslogs \
            --log-opt awslogs-region=ap-south-1 \
            --log-opt awslogs-group=/rita/app \
            --log-opt awslogs-stream=rita-container \
            ${{ env.IMAGE }}:latest
          ENDSSH

      - name: Health check
        run: |
          echo "Waiting for container to start..."
          for i in $(seq 1 36); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.AWS_EC2_IP }}/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i/36 — status $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 3 minutes"
          exit 1
